version: '3'

vars:
  # CI環境では -T を付け、ローカルでは外す
  TTY: '{{if .CI}}-T{{else}}{{end}}'

tasks:
  default:
    cmds:
      - task --list

  # ── Docker (開発) ──────────────────────────────────────────────
  docker:up:
    desc: Dockerコンテナを起動します（Cloudflare Tunnel含む）
    cmds:
      - docker compose --profile dev up -d

  docker:down:
    desc: Dockerコンテナを停止します
    cmds:
      - docker compose --profile dev down

  docker:restart:
    desc: Dockerコンテナを再起動します
    cmds:
      - docker compose --profile dev restart

  docker:rebuild:
    desc: Dockerイメージを再ビルドして起動します
    cmds:
      - docker compose --profile dev up -d --build

  docker:logs:
    desc: Dockerログを表示します
    cmds:
      - docker compose --profile dev logs -f

  docker:logs:tunnel:
    desc: Cloudflare TunnelのログURLを確認します
    cmds:
      - docker compose --profile dev logs tunnel-dev

  docker:clean:
    desc: 完全にクリーンアップして再構築します
    cmds:
      - docker compose --profile dev down -v
      - docker compose --profile dev up -d --build

  # ── アプリケーション ───────────────────────────────────────────
  dev:
    desc: 開発サーバーを起動します
    cmds:
      - docker compose exec {{.TTY}} app pnpm dev

  build:
    desc: アプリケーションをビルドします
    cmds:
      - docker compose exec {{.TTY}} app pnpm build

  add:
    desc: パッケージを追加します
    cmds:
      - docker compose exec {{.TTY}} app pnpm add {{.CLI_ARGS}}

  # ── テスト・品質 ───────────────────────────────────────────────
  test:
    desc: 'テストを実行します（デフォルト: 重いテストはスキップ）'
    cmds:
      - docker compose exec {{.TTY}} app sh -lc "RUN_SLOW_TESTS=0 pnpm test {{.CLI_ARGS}}"

  test:full:
    desc: すべてのテストを実行します（重いテスト含む）
    cmds:
      - docker compose exec {{.TTY}} app sh -lc "RUN_SLOW_TESTS=1 pnpm test {{.CLI_ARGS}}"

  check:
    desc: Lint・型チェック・フォーマットチェックを実行します
    cmds:
      - docker compose exec {{.TTY}} app pnpm check

  check:fix:
    desc: Lintとフォーマットの自動修正を実行します
    cmds:
      - docker compose exec {{.TTY}} app pnpm check:fix

  # ── データベース ───────────────────────────────────────────────
  db:setup:
    desc: データベースのセットアップを実行します
    cmds:
      - docker compose exec {{.TTY}} app pnpm install
      - docker compose exec {{.TTY}} app pnpm drizzle-kit push
      - docker compose exec {{.TTY}} app pnpm tsx src/shared/db/seed.ts

  db:reset:
    desc: データベースをリセットします
    cmds:
      - docker compose exec {{.TTY}} app pnpm tsx src/shared/db/reset.ts

  db:seed:
    desc: データベースにシードデータを投入します
    cmds:
      - docker compose exec {{.TTY}} app pnpm tsx src/shared/db/seed.ts

  db:seed:master:
    desc: マスターデータのみを投入します
    cmds:
      - docker compose exec {{.TTY}} app pnpm tsx src/shared/db/seed.ts --master-only

  db:role:
    desc: ユーザーのロールを変更します
    cmds:
      - docker compose exec {{.TTY}} app pnpm tsx src/shared/db/set-role.ts

  db:redis:reset:
    desc: Redisをリセットします
    cmds:
      - docker compose exec {{.TTY}} app pnpm tsx src/shared/lib/reset-redis.ts

  # ── 本番環境（VM上で実行） ────────────────────────────────────
  prod:up:
    desc: 本番環境を起動・更新します（VM上で実行）
    cmds:
      - git pull origin main
      - docker compose -f docker-compose.prod.yml build app
      - docker compose -f docker-compose.prod.yml up -d --remove-orphans

  prod:down:
    desc: 本番環境のコンテナを停止します（VM上で実行）
    cmds:
      - docker compose -f docker-compose.prod.yml down

  prod:migrate:
    desc: 本番環境のDBマイグレーションを実行します（VM上で実行）
    cmds:
      - docker compose -f docker-compose.prod.yml run --rm app pnpm drizzle-kit push
